<!-- Expand TOC: re-init tocbot with collapseDepth=6 -->
<script>
  (function () {
    function expandToc() {
      if (typeof tocbot === 'undefined') {
        // tocbot not loaded yet, retry
        setTimeout(expandToc, 200);
        return;
      }

      // Sidebar TOC
      var sidebarToc = document.getElementById('toc');
      if (sidebarToc) {
        tocbot.init({
          tocSelector: '#toc',
          contentSelector: '.content',
          ignoreSelector: '[data-toc-skip]',
          headingSelector: 'h2, h3, h4',
          orderedList: false,
          scrollSmooth: false,
          collapseDepth: 6,
          headingsOffset: 32
        });
      }

      // Popup TOC
      var popupToc = document.getElementById('toc-popup-content');
      if (popupToc) {
        tocbot.init({
          tocSelector: '#toc-popup-content',
          contentSelector: '.content',
          ignoreSelector: '[data-toc-skip]',
          headingSelector: 'h2, h3, h4',
          orderedList: false,
          scrollSmooth: false,
          collapseDepth: 6,
          headingsOffset: 48
        });
      }
    }

    // Wait for tocbot to finish its own init, then expand
    setTimeout(expandToc, 600);
  })();
</script>
